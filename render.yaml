# Render Blueprint — deploys the portal as a live HTTPS web service.
# In Render: New + → Blueprint → connect this repo → it reads this file.
# Secrets (sync:false) are pasted once in the Render dashboard, never in git.
services:
  - type: web
    name: delightree-portal
    runtime: docker
    plan: starter            # ~$7/mo; keeps the service always-on (free tier sleeps)
    healthCheckPath: /healthz
    disk:
      name: portal-data       # persists per-rep slates + password hashes across deploys
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: SESSION_SECRET
        generateValue: true   # Render generates a strong random secret
      - key: HUBSPOT_PORTAL_ID
        value: "8332146"
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      # 7AM auto-generation. Flip to "true" once you've set "auto_slate": true on the ADRs
      # who should get a daily slate (drafting every user daily is costly).
      - key: SCHEDULE_ENABLED
        value: "false"
      - key: SCHEDULE_TZ
        value: America/Denver
      - key: SCHEDULE_HOUR
        value: "7"
      # Friday "next week" planning hour (24h, in SCHEDULE_TZ). Same on/off toggle as the morning run.
      - key: SCHEDULE_WEEKLY_HOUR
        value: "15"
      # Public URL used in Slack links (no trailing slash)
      - key: PUBLIC_BASE_URL
        value: https://delightree-portal.onrender.com
      # --- paste these in the Render dashboard (Environment tab) ---
      - key: HUBSPOT_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BOOTSTRAP_PASSWORD   # first-login temp password for the whole team (reps)
        sync: false
      - key: BOOTSTRAP_PASSWORD_ADMIN   # dedicated admin-board password (admins only)
        sync: false
      # ZoomInfo net-new contact sourcing (OAuth2 client-credentials API app)
      - key: ZOOMINFO_CLIENT_ID
        sync: false
      - key: ZOOMINFO_CLIENT_SECRET
        sync: false
      # Keep "false" until /admin/zoominfo-test is green; then flip to "true" to
      # start pulling net-new contacts into the daily slate.
      - key: ZOOMINFO_SOURCING
        value: "false"
      - key: SLACK_BOT_TOKEN      # Slack bot token (xoxb-...) -> DMs each rep their own plan (preferred)
        sync: false
      - key: SLACK_WEBHOOK_URL    # fallback: one-channel summary if no bot token (optional)
        sync: false
